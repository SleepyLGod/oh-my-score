services:
  backend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/transcription-api/Dockerfile
    environment:
      OMG_TRANSCRIPTION_MODEL_PATH: /workspace/.models/transcription.onnx
      OMG_TRANSCRIPTION_WORK_DIR: /workspace/.runtime
      OMG_TRANSCRIPTION_BASIC_PITCH_URL: http://basic-pitch-service:8090
    ports:
      - "8084:8084"
    volumes:
      - ./apps/transcription-api:/workspace/apps/transcription-api
      - ./.isolation/m2:/root/.m2/repository
      - ./.isolation/models:/workspace/.models
      - ./.isolation/backend-workspace:/workspace/.runtime
    working_dir: /workspace/apps/transcription-api
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/transcription/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  basic-pitch-service:
    build:
      context: .
      dockerfile: apps/basic-pitch-service/Dockerfile
    volumes:
      - ./.isolation/backend-workspace:/workspace/.runtime
      - ./.isolation/basic-pitch-service/cache:/workspace/cache
    working_dir: /workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  strudel-sketch-service:
    build:
      context: .
      dockerfile: apps/strudel-sketch-service/Dockerfile
    environment:
      STRUDEL_FRONTEND_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8091:8091"
    working_dir: /workspace/experiment
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8091/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  ai-sketch-service:
    build:
      context: .
      dockerfile: apps/ai-sketch-service/Dockerfile
    environment:
      AI_SKETCH_FRONTEND_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      XIAOMI_API_KEY: ${XIAOMI_API_KEY:-}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      MIMO_BASE_URL: ${MIMO_BASE_URL:-https://token-plan-cn.xiaomimimo.com/v1}
      MIMO_MODEL: ${MIMO_MODEL:-mimo-v2.5-pro}
    ports:
      - "8092:8092"
    working_dir: /workspace/ai-sketch
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8092/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: apps/piano-player/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
      strudel-sketch-service:
        condition: service_healthy
      ai-sketch-service:
        condition: service_healthy

  basic-pitch:
    profiles:
      - research
    build:
      context: .
      dockerfile: experiments/basic-pitch/Dockerfile
    volumes:
      - ./.isolation/basic-pitch/input:/workspace/input
      - ./.isolation/basic-pitch/output:/workspace/output
      - ./.isolation/basic-pitch/cache:/workspace/cache
    working_dir: /workspace

  strudel-sketch:
    profiles:
      - research
    build:
      context: .
      dockerfile: experiments/strudel-sketch/Dockerfile
    volumes:
      - ./.isolation/strudel-sketch/input:/workspace/input
      - ./.isolation/strudel-sketch/output:/workspace/output
    working_dir: /workspace/experiment
