services:
  backend:
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/transcription-api/Dockerfile
    environment:
      OMG_TRANSCRIPTION_MODEL_PATH: /workspace/.models/transcription.onnx
      OMG_TRANSCRIPTION_WORK_DIR: /workspace/.runtime
      OMG_TRANSCRIPTION_BASIC_PITCH_URL: http://basic-pitch-service:8090
    ports:
      - "8084:8084"
    volumes:
      - ./apps/transcription-api:/workspace/apps/transcription-api
      - ./.isolation/m2:/root/.m2/repository
      - ./.isolation/models:/workspace/.models
      - ./.isolation/backend-workspace:/workspace/.runtime
    working_dir: /workspace/apps/transcription-api
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/transcription/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  basic-pitch-service:
    build:
      context: .
      dockerfile: apps/basic-pitch-service/Dockerfile
    volumes:
      - ./.isolation/backend-workspace:/workspace/.runtime
      - ./.isolation/basic-pitch-service/cache:/workspace/cache
    working_dir: /workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: apps/piano-player/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

  basic-pitch:
    profiles:
      - research
    build:
      context: .
      dockerfile: experiments/basic-pitch/Dockerfile
    volumes:
      - ./.isolation/basic-pitch/input:/workspace/input
      - ./.isolation/basic-pitch/output:/workspace/output
      - ./.isolation/basic-pitch/cache:/workspace/cache
    working_dir: /workspace
