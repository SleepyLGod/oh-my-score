server:
    port: 8084

omg:
  transcription:
    work-dir: ${OMG_TRANSCRIPTION_WORK_DIR:${user.dir}/runtime}
    model-path: ${OMG_TRANSCRIPTION_MODEL_PATH:${user.dir}/src/main/resources/transcription.onnx}
    basic-pitch-url: ${OMG_TRANSCRIPTION_BASIC_PITCH_URL:http://basic-pitch-service:8090}

spring:
  devtools:
    restart:
      enabled: true # 热部署默认会重启
      additional-paths: src/main/java # 热部署监控的路径
      exclude: src/main/resources/ # 热部署排除的路径
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
